# Run configuration for Zero-shot-CoT baseline
run_id: comparative-1-zero-shot-cot

method:
  name: zero-shot-cot
  type: comparative-1
  description: "Standard Zero-shot Chain-of-Thought"
  prompt_template: "Let's think step by step."

model:
  name: meta-llama/Llama-3.1-8B-Instruct
  provider: together
  temperature: 0.0
  max_tokens: 512
  top_p: 1.0

dataset:
  name: gsm8k
  split: test
  cache_dir: .cache

inference:
  samples_sanity: 5
  samples_pilot: 50
  samples_full: 1319  # full GSM8K test set
  batch_size: 1
  answer_extraction_pattern: "(?:answer is|Answer:|####)\\s*(.+?)(?:\\n|$)"
